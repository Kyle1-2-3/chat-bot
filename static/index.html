<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<title>Brentwood Assistant</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet" />
<script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
<style>
  /* ============================================================
     Friendly contemporary messenger — warm dark theme
     ============================================================ */
  :root {
    /* Warm dark surfaces */
    --bg:        #131314;   /* page */
    --surface:   #232529;   /* bot bubble, input, cards */
    --surface-2: #2e3036;   /* hover / secondary */
    --header:    rgba(23, 24, 28, 0.82);

    /* Accent (friendly messenger blue) */
    --accent:    #3b82f6;
    --accent-2:  #2f6fe0;
    --accent-soft: rgba(59, 130, 246, 0.16);

    /* Text */
    --text:        #e8eaed;
    --text-muted:  #a6abb4;
    --text-dim:    #71757d;
    --on-accent:   #ffffff;

    /* Lines + depth */
    --line: rgba(255, 255, 255, 0.08);
    --shadow-bubble: 0 1px 2px rgba(0, 0, 0, 0.35);
    --shadow-pop: 0 6px 24px rgba(0, 0, 0, 0.4);

    /* Warning (counter only) */
    --warn: #ff6b5e;

    --font: "Google Sans Text", "Google Sans", "Roboto", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;

    --col: 680px;
    --dock-h: 96px;
    --rail-w: 68px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  body {
    font-family: var(--font);
    font-size: 16px;
    line-height: 1.5;
    color: var(--text);
    background: var(--bg);
    color-scheme: dark;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .app {
    display: flex;
    flex-direction: column;
    min-height: 100%;
    min-height: 100dvh;
  }

  /* ---------------- Scrolling thread ---------------- */
  .thread-scroll {
    flex: 1 1 auto; overflow-y: auto;
    -webkit-overflow-scrolling: touch; scroll-behavior: smooth;
  }
  .thread { width: 100%; max-width: var(--col); margin: 0 auto; padding: 20px 16px 28px; }

  /* ---------------- Empty / welcome state ---------------- */
  .hero {
    min-height: calc(100dvh - 60px - var(--dock-h));
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    text-align: center; gap: 10px; padding: 24px 0;
  }
  .hero.is-hidden { display: none; }
  .hero__title {
    font-size: 42px; font-weight: 500; letter-spacing: -0.6px; margin: 0; color: var(--text);
  }

  /* Welcome layout: title + composer centered as one unit, soft glow behind */
  .app--welcome { justify-content: center; }
  .app--welcome::before {
    content: ""; position: fixed; inset: 0; z-index: -1; pointer-events: none;
    background: radial-gradient(120% 80% at 50% 42%,
      rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 36%, rgba(19,19,20,0) 64%);
  }
  .app--welcome .thread-scroll { flex: 0 0 auto; overflow: visible; }
  .app--welcome .thread { padding: 0 16px; }
  .app--welcome .hero { min-height: 0; padding: 8px 0 26px; }
  .app--welcome .composer-dock {
    position: static; background: transparent; border-top: none;
    -webkit-backdrop-filter: none; backdrop-filter: none;
  }

  /* ---------------- Messages (user bubble · AI plain text) ---------------- */
  .turn { display: flex; align-items: flex-end; gap: 9px; margin-bottom: 24px; }
  .turn--user { justify-content: flex-end; }
  .turn--bot  { display: block; margin-bottom: 36px; }

  .bubble {
    max-width: 78%;
    font-size: 17px; line-height: 1.6;
    padding: 11px 18px; border-radius: 20px;
    white-space: pre-wrap; overflow-wrap: anywhere;
    box-shadow: var(--shadow-bubble);
  }
  .bubble-user {
    background: #2a2b2d; color: var(--text);
  }
  /* AI response: no avatar, no bubble — airy full-width text (Gemini-style) */
  .bubble-bot {
    max-width: 100%;
    background: none; color: var(--text);
    padding: 2px 0; border-radius: 0; box-shadow: none;
    line-height: 1.75; white-space: normal;
  }
  .bot-col { display: flex; flex-direction: column; align-items: flex-start; max-width: 100%; gap: 4px; }
  .bot-col .bubble { max-width: 100%; }

  /* Rendered markdown inside an AI reply */
  .bubble-bot > :first-child { margin-top: 0; }
  .bubble-bot > :last-child { margin-bottom: 0; }
  .bubble-bot p { margin: 0 0 14px; }
  .bubble-bot h1, .bubble-bot h2, .bubble-bot h3 { font-weight: 500; line-height: 1.3; margin: 22px 0 10px; }
  .bubble-bot h1 { font-size: 24px; }
  .bubble-bot h2 { font-size: 20px; }
  .bubble-bot h3 { font-size: 17px; }
  .bubble-bot ul, .bubble-bot ol { margin: 0 0 14px; padding-left: 26px; }
  .bubble-bot li { margin: 4px 0; }
  .bubble-bot strong { font-weight: 700; }
  .bubble-bot a { color: var(--accent); text-decoration: none; }
  .bubble-bot a:hover { text-decoration: underline; }
  .bubble-bot code { font-family: ui-monospace, SFMono-Regular, Menlo, monospace; font-size: 0.9em; background: var(--surface); padding: 1px 5px; border-radius: 5px; }
  .bubble-bot pre { background: var(--surface); padding: 12px 14px; border-radius: 10px; overflow-x: auto; margin: 0 0 14px; }
  .bubble-bot pre code { background: none; padding: 0; }

  .bot-actions { padding-left: 0; height: 0; overflow: hidden; opacity: 0; transition: opacity 0.18s ease; }
  .turn--bot:hover .bot-actions, .turn--bot:focus-within .bot-actions { height: auto; opacity: 1; }
  .copy-btn {
    font-family: var(--font); font-size: 13px; font-weight: 600; color: var(--text-muted);
    background: transparent; border: none; padding: 2px 0; cursor: pointer;
    display: inline-flex; align-items: center; gap: 5px;
  }
  .copy-btn:hover { color: var(--text); }
  .copy-btn:active { transform: scale(0.96); }
  .copy-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 6px; }
  .copy-btn svg { width: 13px; height: 13px; }

  /* Typing dots inside a bot bubble */
  .typing { display: inline-flex; align-items: center; gap: 5px; padding: 3px 1px; }
  .typing span { width: 8px; height: 8px; border-radius: 50%; background: var(--text-dim); animation: bounce 1.2s infinite ease-in-out both; }
  .typing span:nth-child(2) { animation-delay: 0.18s; }
  .typing span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%,80%,100% { transform: scale(0.6); opacity: 0.4; } 40% { transform: scale(1); opacity: 1; } }

  /* Inline error + retry */
  .retry {
    margin-top: 2px; align-self: flex-start;
    display: inline-flex; align-items: center; gap: 6px;
    font-family: var(--font); font-size: 14px; font-weight: 600; color: var(--accent);
    background: var(--accent-soft); border: none; border-radius: 9999px;
    padding: 8px 15px; cursor: pointer; min-height: 38px;
  }
  .retry:hover { background: rgba(59,130,246,0.24); }
  .retry:active { transform: scale(0.96); }
  .retry:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .retry svg { width: 15px; height: 15px; }

  /* ---------------- Composer ---------------- */
  .composer-dock {
    position: sticky; bottom: 0; z-index: 20; flex: 0 0 auto;
    background: var(--header);
    -webkit-backdrop-filter: saturate(160%) blur(18px);
    backdrop-filter: saturate(160%) blur(18px);
    border-top: 1px solid var(--line);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .composer { width: 100%; max-width: var(--col); margin: 0 auto; padding: 12px 16px 8px; }
  .composer__field {
    display: flex; align-items: flex-end; gap: 8px;
    background: var(--surface); border: 1px solid var(--line);
    border-radius: 24px; padding: 5px 5px 5px 18px;
    box-shadow: var(--shadow-bubble);
    transition: border-color 0.18s ease;
  }
  .composer__field:focus-within { border-color: rgba(255,255,255,0.22); }
  textarea#input {
    flex: 1 1 auto; resize: none; border: none; outline: none; background: transparent;
    font-family: var(--font); font-size: 17px; line-height: 1.5; color: var(--text);
    padding: 9px 0; max-height: 132px; overflow-y: auto;
  }
  textarea#input::placeholder { color: var(--text-dim); }

  .send {
    flex: 0 0 auto; width: 42px; height: 42px; border-radius: 50%; border: none;
    background: var(--accent); color: #fff;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
    box-shadow: var(--shadow-bubble);
    transition: transform 0.12s ease, background 0.18s ease, opacity 0.18s ease;
  }
  .send svg { width: 19px; height: 19px; }
  .send:not(:disabled):hover { background: var(--accent-2); }
  .send:not(:disabled):active { transform: scale(0.94); }
  .send:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .send:disabled { background: var(--surface-2); color: var(--text-dim); cursor: default; box-shadow: none; }

  .composer__meta { display: flex; justify-content: space-between; align-items: center; gap: 12px; padding: 6px 6px 0; min-height: 16px; }
  .composer__hint { font-size: 12px; font-weight: 500; color: var(--text-dim); }
  .counter { font-size: 12px; font-weight: 500; color: var(--text-dim); font-variant-numeric: tabular-nums; white-space: nowrap; }
  .counter.is-warn { color: var(--warn); }

  /* ---------------- Sidebar (view switcher) ---------------- */
  .sidebar {
    position: fixed; left: 0; top: 0; bottom: 0; z-index: 40;
    width: var(--rail-w);
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    padding: 14px 0;
    background: var(--header);
    -webkit-backdrop-filter: saturate(160%) blur(18px);
    backdrop-filter: saturate(160%) blur(18px);
    border-right: 1px solid var(--line);
  }
  .nav-btn {
    width: 52px; padding: 8px 0 6px; border: none; border-radius: 14px;
    background: transparent; color: var(--text-muted); cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-family: var(--font); font-size: 11px; font-weight: 600;
  }
  .nav-btn svg { width: 22px; height: 22px; }
  .nav-btn:hover { background: var(--surface-2); color: var(--text); }
  .nav-btn.is-active { background: var(--accent-soft); color: var(--accent); }
  .nav-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .app, .map-view { margin-left: var(--rail-w); }

  /* ---------------- Responsive ---------------- */
  @media (max-width: 640px) {
    .thread { padding: 16px 12px 22px; }
    .hero__title { font-size: 34px; }
    .bubble-user { max-width: 84%; }
    .composer__hint { display: none; }
    .composer__meta { justify-content: flex-end; }
    .sidebar {
      top: auto; bottom: 0; left: 0; right: 0; width: auto;
      flex-direction: row; justify-content: center; gap: 24px;
      padding: 4px 0 calc(4px + env(safe-area-inset-bottom));
      border-right: none; border-top: 1px solid var(--line);
    }
    .app, .map-view { margin-left: 0; }
    .composer-dock { bottom: 64px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .thread-scroll { scroll-behavior: auto; }
    .typing span { animation: none; opacity: 0.7; transform: scale(0.85); }
    .send:not(:disabled):active, .copy-btn:active, .retry:active { transform: none; }
  }
  .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
</style>
</head>
<body>
  <nav class="sidebar" aria-label="Views">
    <button type="button" class="nav-btn is-active" id="navChat">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      <span>Chat</span>
    </button>
    <button type="button" class="nav-btn" id="navMap">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21l-6-3V3l6 3 6-3 6 3v15l-6-3-6 3z"/><path d="M9 6v15"/><path d="M15 3v15"/></svg>
      <span>Map</span>
    </button>
  </nav>
  <div class="app">
    <!-- Thread -->
    <main class="thread-scroll" id="scroll">
      <div class="thread">
        <!-- Welcome -->
        <section class="hero" id="hero">
          <h1 class="hero__title">Brentwood Assistant</h1>
        </section>

        <div id="log" role="log" aria-live="polite" aria-label="Conversation"></div>
      </div>
    </main>

    <!-- Composer -->
    <div class="composer-dock">
      <form class="composer" id="form">
        <div class="composer__field">
          <label for="input" class="sr-only">Message Brentwood Assistant</label>
          <textarea id="input" rows="1" maxlength="500" placeholder="Type a message&hellip;" aria-describedby="counter"></textarea>
          <button class="send" id="send" type="submit" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
              <path d="M12 19V5"/><path d="m5 12 7-7 7 7"/>
            </svg>
          </button>
        </div>
        <div class="composer__meta">
          <span class="composer__hint">Enter to send &middot; Shift+Enter for a new line</span>
          <span class="counter" id="counter" aria-live="off">0/500</span>
        </div>
      </form>
    </div>
  </div>

<script>
  // ============================================================
  // API: Flask serves @app.route("/chat", POST). Behind nginx that
  // proxies "/api", change to "/api/chat". POST {message,memory}->{reply}
  // ============================================================
  const API_ENDPOINT = "/chat";
  const MAX_CHARS = 500;
  const WARN_AT = 450;
  const REQUEST_TIMEOUT_MS = 18000;

  const conversation = []; // { role:"user"|"bot", text } — memory only, no localStorage

  const appEl     = document.querySelector(".app");
  const scrollEl  = document.getElementById("scroll");
  const heroEl    = document.getElementById("hero");
  const logEl     = document.getElementById("log");
  const formEl    = document.getElementById("form");
  const inputEl   = document.getElementById("input");
  const sendEl    = document.getElementById("send");
  const counterEl = document.getElementById("counter");
  const dockEl    = document.querySelector(".composer-dock");

  let inFlight = false;

  const ICON_COPY ='<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="9" y="9" width="11" height="11" rx="2"/><path d="M5 15V5a2 2 0 0 1 2-2h10"/></svg>';
  const ICON_RETRY = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/></svg>';

  // ---------------- Composer behavior ----------------
  function autoGrow() { inputEl.style.height = "auto"; inputEl.style.height = Math.min(inputEl.scrollHeight, 132) + "px"; }
  function updateCounter() {
    const n = inputEl.value.length;
    counterEl.textContent = n + "/" + MAX_CHARS;
    counterEl.classList.toggle("is-warn", n >= WARN_AT);
  }
  function refreshSendState() { sendEl.disabled = inputEl.value.trim().length === 0 || inFlight; }

  inputEl.addEventListener("input", () => {
    if (inputEl.value.length > MAX_CHARS) inputEl.value = inputEl.value.slice(0, MAX_CHARS);
    autoGrow(); updateCounter(); refreshSendState();
  });
  inputEl.addEventListener("keydown", (e) => {
    if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); formEl.requestSubmit(); }
  });
  formEl.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = inputEl.value.trim();
    if (!text || inFlight) return;
    sendMessage(text);
  });
  // ---------------- Rendering (textContent only for model output) ----------------
  function hideHero() { heroEl.classList.add("is-hidden"); appEl.classList.remove("app--welcome"); }
  function scrollToBottom() { requestAnimationFrame(() => { scrollEl.scrollTop = scrollEl.scrollHeight; }); }

  function appendUser(text) {
    const turn = document.createElement("div");
    turn.className = "turn turn--user";
    const bubble = document.createElement("div");
    bubble.className = "bubble bubble-user";
    bubble.textContent = text;
    turn.appendChild(bubble);
    logEl.appendChild(turn);
    scrollToBottom();
  }

  function makeBotTurn() {
    const turn = document.createElement("div");
    turn.className = "turn turn--bot";
    const col = document.createElement("div");
    col.className = "bot-col";
    const bubble = document.createElement("div");
    bubble.className = "bubble bubble-bot";
    col.appendChild(bubble);
    turn.appendChild(col);
    logEl.appendChild(turn);
    return { turn, bubble, col };
  }

  function showTyping(bubble) {
    const t = document.createElement("div");
    t.className = "typing"; t.setAttribute("role", "status");
    t.setAttribute("aria-label", "Brentwood Assistant is typing");
    t.innerHTML = "<span></span><span></span><span></span>";
    bubble.appendChild(t);
    scrollToBottom();
  }

  // Render an AI reply as sanitized markdown (bold, lists, etc.). Falls back
  // to plain text if a CDN lib is missing or anything throws.
  function renderRichText(el, text) {
    try {
      if (!window.marked || !window.DOMPurify) throw new Error("md libs unavailable");
      el.innerHTML = DOMPurify.sanitize(marked.parse(text, { breaks: true }));
    } catch (e) {
      el.style.whiteSpace = "pre-wrap"; // preserve newlines without markdown
      el.textContent = text;
    }
  }

  function renderReply(bubble, col, text) {
    renderRichText(bubble, text); // sanitized markdown, falls back to plain text
    const actions = document.createElement("div");
    actions.className = "bot-actions";
    const copyBtn = document.createElement("button");
    copyBtn.type = "button"; copyBtn.className = "copy-btn";
    copyBtn.innerHTML = ICON_COPY + "<span>Copy</span>";
    copyBtn.addEventListener("click", () => {
      navigator.clipboard?.writeText(text).then(() => {
        const label = copyBtn.querySelector("span"); const prev = label.textContent;
        label.textContent = "Copied"; setTimeout(() => { label.textContent = prev; }, 1400);
      });
    });
    actions.appendChild(copyBtn);
    col.appendChild(actions);
    scrollToBottom();
  }

  function renderError(bubble, col, lastUserText) {
    bubble.textContent = "Sorry, I couldn’t reach the server. Please try again.";
    const retry = document.createElement("button");
    retry.type = "button"; retry.className = "retry";
    retry.innerHTML = ICON_RETRY + "<span>Try again</span>";
    retry.addEventListener("click", () => {
      if (inFlight) return;
      const turn = col.closest(".turn");
      if (turn) turn.remove();
      runRequest(lastUserText);
    });
    col.appendChild(retry);
    scrollToBottom();
  }

  // ---------------- Memory (turns prior to the in-flight message) ----------------
  function buildMemory() {
    const prior = conversation.slice(0, -1);
    return prior.slice(-4)
      .map(t => (t.role === "user" ? "Student" : "Assistant") + ": " + t.text)
      .join("\n");
  }

  // ---------------- Send flow ----------------
  function sendMessage(text) {
    hideHero();
    appendUser(text);
    conversation.push({ role: "user", text });
    inputEl.value = ""; autoGrow(); updateCounter();
    runRequest(text);
  }

  async function runRequest(userText) {
    inFlight = true; refreshSendState();
    const { bubble, col } = makeBotTurn();
    showTyping(bubble);

    const memory = buildMemory();
    const controller = new AbortController();
    const timer = setTimeout(() => controller.abort(), REQUEST_TIMEOUT_MS);

    try {
      const res = await fetch(API_ENDPOINT, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ message: userText, memory }),
        signal: controller.signal,
      });
      clearTimeout(timer);
      if (!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const hasReply = !!(data && typeof data.reply === "string" && data.reply.trim());
      const reply = hasReply ? data.reply : "I’m sorry — I didn’t catch that. Could you try rephrasing?";
      renderReply(bubble, col, reply);
      if (hasReply) conversation.push({ role: "bot", text: reply });
    } catch (err) {
      clearTimeout(timer);
      renderError(bubble, col, userText);
    } finally {
      inFlight = false; refreshSendState();
    }
  }

  // Keep welcome centered as composer grows
  if (window.ResizeObserver && dockEl) {
    const ro = new ResizeObserver((entries) => {
      for (const e of entries) document.documentElement.style.setProperty("--dock-h", Math.round(e.contentRect.height) + "px");
    });
    ro.observe(dockEl);
  }

  // ---------------- Sidebar view switching ----------------
  const navChatBtn = document.getElementById("navChat");
  const navMapBtn  = document.getElementById("navMap");
  const mapViewEl  = document.getElementById("mapView");

  function showView(view) {
    const isMap = view === "map";
    appEl.style.display = isMap ? "none" : "";
    if (mapViewEl) mapViewEl.hidden = !isMap;
    navChatBtn.classList.toggle("is-active", !isMap);
    navMapBtn.classList.toggle("is-active", isMap);
  }
  navChatBtn.addEventListener("click", () => showView("chat"));
  navMapBtn.addEventListener("click", () => showView("map"));

  appEl.classList.add("app--welcome");
  updateCounter(); refreshSendState(); autoGrow();
</script>
</body>
</html>
