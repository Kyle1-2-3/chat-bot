<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>School Chatbot</title>

  <style>
    :root {
      --bg: #000;
      --panel: #0b0b0b;
      --panel2: #111;
      --border: #222;
      --text: #fff;
      --muted: #a3a3a3;
      --me: #1f2937;
      --bot: #111827;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 14px 12px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }
    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: linear-gradient(180deg, #000 0%, #050505 100%);
      scroll-behavior: smooth;
    }

    /* --- Animations --- */
    .row {
      display: flex;
      margin: 10px 0;
      animation: msgPop 0.25s ease-out;
    }
    @keyframes msgPop {
      from { opacity: 0; transform: translateY(8px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .row.me { justify-content: flex-end; }
    .row.bot { justify-content: flex-start; }

    .bubble {
      max-width: min(560px, 86%);
      padding: 10px 14px;
      border-radius: 18px; /* Slightly rounder like IG */
      border: 1px solid var(--border);
      background: var(--panel2);
      line-height: 1.4;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 16px;
    }
    .row.me .bubble {
      background: var(--me);
      border-color: #2b2b2b;
      border-bottom-right-radius: 4px;
    }
    .row.bot .bubble {
      background: var(--bot);
      border-color: #1f2937;
      border-bottom-left-radius: 4px;
    }

    /* --- Wavy Typing Indicator --- */
    .typing-container {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 0;
    }
    .typing-dot {
      width: 6px;
      height: 6px;
      background: #71717a;
      border-radius: 50%;
      animation: wave 1.3s infinite ease-in-out;
    }
    .typing-dot:nth-child(2) { animation-delay: 0.15s; }
    .typing-dot:nth-child(3) { animation-delay: 0.3s; }

    @keyframes wave {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }

    .composer {
      position: sticky;
      bottom: 0;
      z-index: 10;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    }

    .composer-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 44px;
      max-height: 120px;
      padding: 12px 16px;
      font-size: 16px;
      background: #18181b;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 22px; /* Pill shaped like IG */
      resize: none;
      outline: none;
      transition: border-color 0.2s;
    }
    textarea:focus {
      border-color: var(--accent);
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 4px;
      align-items: center;
      min-width: 60px;
    }

    button {
      background: transparent;
      color: var(--accent);
      border: none;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      padding: 8px;
    }
    button:disabled {
      color: #3f3f46;
      cursor: not-allowed;
    }

    #charCount {
      font-size: 10px;
      color: var(--muted);
    }
    #charCount.warning { color: #ef4444; }

    @media (min-width: 768px) {
      .header { padding: 16px 18px 14px; }
      #chat { padding: 18px; }
      .composer { padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="header">
      <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
        <div>
          <h1 class="title">School Chatbot</h1>
          <p class="subtitle">Ask about meals, schedule, or dorm rules</p>
        </div>
        <a href="YOUR_GOOGLE_FORM_LINK" target="_blank" style="font-size:12px; padding:8px 12px; border-radius:999px; border:1px solid #222; color:white; text-decoration:none; background:rgba(255,255,255,0.06);">Feedback</a>
      </div>
    </div>

    <div id="chat"></div>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="msg" rows="1" placeholder="Message..."></textarea>
        <div class="right">
          <button id="sendBtn">Send</button>
          <div id="charCount">0/200</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");
    const counter = document.getElementById("charCount");
    const sendBtn = document.getElementById("sendBtn");

    const MAX_CHARS = 200;
    sendBtn.disabled = true;

    function getMemory() {
      const history = JSON.parse(localStorage.getItem("chatMemory") || "[]");
      return history.slice(-6).join("\n");
    }

    function saveMemory(user, bot) {
      const history = JSON.parse(localStorage.getItem("chatMemory") || "[]");
      history.push(`User: ${user}`, `Assistant: ${bot}`);
      localStorage.setItem("chatMemory", JSON.stringify(history.slice(-6)));
    }

    function addMessage(role, text, isTyping = false) {
      const row = document.createElement("div");
      row.className = `row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      
      if (isTyping) {
        bubble.innerHTML = `
          <div class="typing-container">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
          </div>
        `;
      } else {
        bubble.textContent = text;
      }

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
      return row; // Return the row so we can remove it later
    }

    function autosize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    }

    input.addEventListener("input", () => {
      if (input.value.length > MAX_CHARS) input.value = input.value.slice(0, MAX_CHARS);
      autosize();
      const len = input.value.length;
      counter.textContent = `${len}/${MAX_CHARS}`;
      counter.classList.toggle("warning", len >= MAX_CHARS);
      sendBtn.disabled = (len === 0);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    async function send() {
      const message = input.value.trim();
      if (!message || message.length > MAX_CHARS) return;

      addMessage("me", message);
      input.value = "";
      autosize();
      sendBtn.disabled = true;

      // Show the wavy typing animation
      const loadingRow = addMessage("bot", null, true);

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ message, memory: getMemory() })
        });

        const data = await res.json();
        loadingRow.remove(); // Remove the dots

        const reply = data.reply ?? "(no reply)";
        addMessage("bot", reply);
        saveMemory(message, reply);
      } catch (err) {
        loadingRow.remove();
        addMessage("bot", "Something went wrong. Please try again.");
      }
    }

    addMessage("bot", "Hey! Ask me about today’s meals, academic blocks, or dorm rules 🙂");
  </script>
</body>
</html>
