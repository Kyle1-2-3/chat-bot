<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>School Chatbot</title>

  <style>
    :root {
      --bg: #000;
      --panel: #0b0b0b;
      --panel2: #111;
      --border: #222;
      --text: #fff;
      --muted: #a3a3a3;
      --me: #1f2937;
      --bot: #111827;
      --accent: #3b82f6;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: Arial, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .app {
      height: 100dvh;
      display: flex;
      flex-direction: column;
      max-width: 720px;
      margin: 0 auto;
    }

    .header {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--border);
      padding: 14px 14px 12px;
    }
    .title {
      font-size: 16px;
      font-weight: 700;
      margin: 0;
    }
    .subtitle {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      background: linear-gradient(180deg, #000 0%, #050505 100%);
    }

    .row {
      display: flex;
      margin: 10px 0;
    }
    .row.me { justify-content: flex-end; }
    .row.bot { justify-content: flex-start; }

    .bubble {
      max-width: min(560px, 86%);
      padding: 10px 12px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--panel2);
      line-height: 1.35;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 16px;
    }
    .row.me .bubble {
      background: var(--me);
      border-color: #2b2b2b;
    }
    .row.bot .bubble {
      background: var(--bot);
      border-color: #1f2937;
    }

    .composer {
      position: sticky;
      bottom: 0;
      z-index: 10;
      background: rgba(0,0,0,0.9);
      backdrop-filter: blur(8px);
      border-top: 1px solid var(--border);
      padding: 10px 10px calc(10px + env(safe-area-inset-bottom));
    }

    .composer-inner {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }

    textarea {
      flex: 1;
      min-height: 46px;
      max-height: 120px;
      padding: 12px 12px;
      font-size: 16px;
      background: #0f0f0f;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 12px;
      resize: none;
      outline: none;
    }
    textarea:focus {
      border-color: rgba(59,130,246,0.7);
      box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
    }

    .right {
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
      min-width: 92px;
    }

    button {
      width: 92px;
      padding: 11px 12px;
      font-size: 15px;
      font-weight: 700;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
    }
    button:disabled {
      background: #2b2b2b;
      cursor: not-allowed;
      color: #bdbdbd;
    }

    #charCount {
      font-size: 12px;
      color: var(--muted);
    }
    #charCount.warning { color: #ef4444; }

    @media (min-width: 768px) {
      .header { padding: 16px 18px 14px; }
      #chat { padding: 18px; }
      .composer { padding: 12px 18px calc(12px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>

<body>
  <div class="app">
  <div class="header">
  <div style="display:flex; align-items:center; justify-content:space-between; gap:12px;">
    
    <div>
      <h1 class="title">School Chatbot</h1>
      <p class="subtitle">Ask about meals, schedule, or dorm rules</p>
    </div>

    <a
      href="YOUR_GOOGLE_FORM_LINK"
      target="_blank"
      rel="noopener noreferrer"
      style="
        font-size:12px;
        padding:8px 10px;
        border-radius:999px;
        border:1px solid #222;
        color:white;
        text-decoration:none;
        background:rgba(255,255,255,0.06);
        white-space:nowrap;
      "
    >
      Feedback
    </a>

  </div>
</div>

    <div id="chat"></div>

    <div class="composer">
      <div class="composer-inner">
        <textarea id="msg" rows="1" placeholder="Ask something... (Enter to send, Shift+Enter for new line)"></textarea>

        <div class="right">
          <div id="charCount">0 / 200</div>
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const input = document.getElementById("msg");
    const chat = document.getElementById("chat");
    const counter = document.getElementById("charCount");
    const sendBtn = document.getElementById("sendBtn");

    const MAX_CHARS = 200;
    sendBtn.disabled = true;

    // ---------------------------
    // MEMORY (last 3 turns)
    // ---------------------------
    function getMemory() {
      const history = JSON.parse(localStorage.getItem("chatMemory") || "[]");
      return history.slice(-6).join("\n"); // 3 turns => 6 lines (User/Assistant pairs)
    }

    function saveMemory(user, bot) {
      const history = JSON.parse(localStorage.getItem("chatMemory") || "[]");
      history.push(`User: ${user}`);
      history.push(`Assistant: ${bot}`);
      localStorage.setItem("chatMemory", JSON.stringify(history.slice(-6)));
    }

    function addMessage(role, text) {
      const row = document.createElement("div");
      row.className = `row ${role}`;

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;

      row.appendChild(bubble);
      chat.appendChild(row);

      chat.scrollTop = chat.scrollHeight;
    }

    function autosize() {
      input.style.height = "auto";
      input.style.height = Math.min(input.scrollHeight, 120) + "px";
    }

    input.addEventListener("input", () => {
      if (input.value.length > MAX_CHARS) {
        input.value = input.value.slice(0, MAX_CHARS);
      }

      autosize();

      const len = input.value.length;
      counter.textContent = `${len} / ${MAX_CHARS}`;

      if (len >= MAX_CHARS) counter.classList.add("warning");
      else counter.classList.remove("warning");

      sendBtn.disabled = (len === 0);
    });

    input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        send();
      }
    });

    sendBtn.addEventListener("click", () => send());

    async function send() {
      const message = input.value.trim();
      if (!message) return;

      if (message.length > MAX_CHARS) {
        alert("Input cannot exceed 200 characters.");
        return;
      }

      // UI: my message
      addMessage("me", message);

      // reset input
      input.value = "";
      autosize();
      counter.textContent = `0 / ${MAX_CHARS}`;
      counter.classList.remove("warning");
      sendBtn.disabled = true;

      // loading bubble
      const row = document.createElement("div");
      row.className = "row bot";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = "Typing...";
      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;

      try {
        const res = await fetch("/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            message,
            memory: getMemory()
          })
        });

        const data = await res.json();

        row.remove();
        const reply = data.reply ?? "(no reply)";
        addMessage("bot", reply);

        // save last 3 turns
        saveMemory(message, reply);

      } catch (err) {
        row.remove();
        addMessage("bot", "Something went wrong. Please try again.");
      }
    }

    addMessage("bot", "Hey! Ask me about today’s meals, academic blocks, or dorm rules 🙂");
  </script>
</body>
</html>
