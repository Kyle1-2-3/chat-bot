# Shared per-IP rate limit for /chat. Lives in nginx (not flask-limiter)
# because gunicorn runs 3 workers and flask-limiter's in-memory counters are
# per-worker; nginx counts across all of them. flask-limiter stays as the
# per-day backstop. 10r/m + burst 9 = 10 quick messages, then ~1 per 6s.
limit_req_zone $binary_remote_addr zone=chat:10m rate=10r/m;

server {
    listen 80;
    server_name brentwoodchatbot.xyz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name brentwoodchatbot.xyz;

    ssl_certificate /etc/letsencrypt/live/brentwoodchatbot.xyz-0001/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brentwoodchatbot.xyz-0001/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        root /home/ec2-user/chat-bot/static;
        index index.html;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    location /chat {
        limit_req zone=chat burst=9 nodelay;
        limit_req_status 429;
        error_page 429 = @chat_limited;

        proxy_pass http://unix:/home/ec2-user/chat-bot/chatbot.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location @chat_limited {
        default_type application/json;
        return 429 '{"reply":"Whoa, that is a lot of messages at once 🙂 Give it a few seconds and try again."}';
    }

    location /api {
        proxy_pass http://unix:/home/ec2-user/chat-bot/chatbot.sock;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
